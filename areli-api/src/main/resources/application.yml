spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: areli-api
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/areli?currentSchema=areli,public}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:2}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      idle-timeout: 30000
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: areli
    default-schema: areli
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: areli
        jdbc:
          time_zone: America/Lima

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

gemini:
  api:
    key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:openai}
    default-model: ${OPENAI_MODEL:gpt-5}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:45}
